<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter from Birmingham Jail — Close Reading</title>
<style>
:root {
  --navy: #1A2E4A;
  --navy-light: #E8EDF5;
  --gold: #B8860B;
  --gold-light: #FDF6E3;
  --cream: #FAF8F3;
  --ink: #1C1C1A;
  --ink-muted: #5A5855;
  --ink-faint: #9A9690;
  --rule: #E2DDD6;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --success: #3B6D11;
  --success-light: #EAF3DE;
  --error: #A32D2D;
  --error-light: #FCEBEB;
  --radius: 8px;
  --radius-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.8;
  font-size: 17px;
}

/* ── MASTHEAD ── */
.masthead {
  background: var(--navy);
  color: var(--cream);
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 4px solid var(--gold);
}
.masthead-eyebrow {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.5rem;
}
.masthead h1 {
  font-size: 26px;
  font-weight: normal;
  letter-spacing: -0.02em;
  line-height: 1.25;
  margin-bottom: 0.4rem;
}
.masthead-sub {
  font-size: 14px;
  color: #B4B2A9;
  font-style: italic;
}

/* ── PROGRESS ── */
.progress-bar {
  background: #111;
  padding: 0.6rem 2.5rem;
  display: flex;
  gap: 2px;
  border-bottom: 1px solid #333;
}
.prog-step {
  flex: 1;
  text-align: center;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #555;
  padding: 0.4rem 0.3rem;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.prog-step.active { color: #D4AF37; border-bottom-color: #D4AF37; }
.prog-step.done   { color: #777; border-bottom-color: #444; }

/* ── SCREENS ── */
.screen { display: none; max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem; }
.screen.active { display: block; }

/* ── INTRO ── */
.intro-box {
  background: var(--navy);
  color: var(--cream);
  border-radius: var(--radius-lg);
  padding: 2rem 2.5rem;
  margin-bottom: 1.5rem;
}
.intro-box h2 { font-size: 22px; font-weight: normal; margin-bottom: 0.9rem; color: #D4AF37; }
.intro-box p { font-size: 16px; line-height: 1.75; margin-bottom: 0.8rem; }
.intro-box p:last-child { margin-bottom: 0; }

.context-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.context-card {
  background: white;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}
.context-card h3 {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.6rem;
}
.context-card p { font-size: 15px; line-height: 1.65; color: var(--ink-muted); }

.lens-box {
  background: var(--gold-light);
  border-left: 4px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.lens-box h3 {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}
.lens-box p { font-size: 15px; line-height: 1.65; }

.vocab-requirement {
  background: var(--purple-light);
  border: 1px solid #CECBF6;
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.4rem;
  margin-bottom: 1.5rem;
  font-size: 15px;
  line-height: 1.65;
}
.vocab-requirement strong { color: var(--purple); }

/* ── CHUNK HEADER ── */
.chunk-header {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--rule);
}
.chunk-num {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--navy);
  color: #D4AF37;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  font-weight: bold;
  flex-shrink: 0;
}
.chunk-meta h2 { font-size: 20px; font-weight: normal; margin-bottom: 0.2rem; }
.chunk-meta .chunk-focus {
  font-size: 13px;
  color: var(--ink-muted);
  font-family: 'Courier New', monospace;
  letter-spacing: 0.04em;
}

/* ── VOCAB — always visible cards ── */
.vocab-section { margin-bottom: 1.75rem; }
.vocab-section-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.75rem;
}
.vocab-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px;
}
.vocab-card {
  background: white;
  border: 1px solid var(--rule);
  border-left: 3px solid var(--navy);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.75rem 1rem;
}
.vocab-card .vc-word {
  font-weight: bold;
  color: var(--navy);
  font-size: 15px;
  margin-bottom: 0.25rem;
}
.vocab-card .vc-def {
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink-muted);
}

/* ── EXCERPT ── */
.excerpt-section { margin-bottom: 1.75rem; }
.excerpt-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.75rem;
}
.excerpt {
  background: white;
  border: 1px solid var(--rule);
  border-left: 4px solid var(--navy);
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  padding: 1.75rem 2rem;
  font-size: 17px;
  line-height: 2;
  user-select: text;
  cursor: text;
}
.excerpt p { margin-bottom: 1.2em; }
.excerpt p:last-child { margin-bottom: 0; }
.user-hl { background: #FFF3B0; border-radius: 2px; padding: 0 1px; }
.excerpt-hint {
  font-size: 12px;
  font-family: 'Courier New', monospace;
  color: var(--ink-faint);
  font-style: italic;
  margin-top: 0.5rem;
}

/* ── ANNOTATION ── */
.annotate-prompt {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  background: var(--navy-light);
  border-left: 3px solid var(--navy);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.65rem 0.9rem;
  font-size: 14px;
  line-height: 1.55;
  margin-bottom: 0.6rem;
}
.annotate-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.annotate-explain {
  margin-top: 0.5rem;
  background: white;
  border: 1px solid #C4D0E8;
  border-radius: var(--radius);
  overflow: hidden;
}
.annotate-explain-label {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--navy);
  background: var(--navy-light);
  padding: 0.35rem 0.9rem;
  display: block;
  border-bottom: 1px solid #C4D0E8;
}
.annotate-explain textarea {
  width: 100%;
  min-height: 65px;
  padding: 0.65rem 0.9rem;
  border: none;
  font-family: 'Georgia', serif;
  font-size: 15px;
  line-height: 1.65;
  resize: vertical;
  background: white;
  color: var(--ink);
}
.annotate-explain textarea:focus { outline: 2px solid var(--navy); outline-offset: -1px; }

/* ── MC QUESTIONS ── */
.questions-section { margin-bottom: 1.75rem; }
.questions-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.75rem;
}
.question-block {
  background: white;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}
.dok-badge {
  display: inline-block;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  margin-bottom: 0.5rem;
  background: var(--navy-light);
  color: var(--navy);
}
.dok-badge.dok2 { background: #FFF4E0; color: #7F4F00; }
.question-text { font-size: 16px; line-height: 1.6; margin-bottom: 1rem; }
.mc-options { display: flex; flex-direction: column; gap: 8px; }
.mc-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 0.65rem 0.9rem;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 15px;
  line-height: 1.55;
  transition: background 0.12s, border-color 0.12s;
  background: var(--cream);
}
.mc-option:hover:not(.locked) { background: #F0EDE6; border-color: #C8C3BB; }
.mc-option.selected  { background: var(--purple-light); border-color: var(--purple); }
.mc-option.correct   { background: var(--success-light); border-color: var(--success); }
.mc-option.incorrect { background: var(--error-light); border-color: var(--error); }
.mc-letter {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  color: var(--ink-muted);
  min-width: 18px;
  margin-top: 2px;
  flex-shrink: 0;
}
.mc-feedback {
  display: none;
  margin-top: 0.7rem;
  padding: 0.65rem 0.9rem;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
}
.mc-feedback.show { display: block; }
.mc-feedback.correct  { background: var(--success-light); color: var(--success); }
.mc-feedback.incorrect { background: var(--error-light); color: var(--error); }

/* ── MAIN IDEA BOX ── */
.main-idea-section { margin-bottom: 1.75rem; }
.main-idea-box {
  background: var(--gold-light);
  border: 1px solid #E8D5A0;
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
}
.main-idea-box h3 {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
}
.frames { margin-bottom: 0.9rem; }
.frame {
  font-size: 14px;
  color: var(--ink-muted);
  font-style: italic;
  padding: 0.35rem 0.75rem;
  border-left: 2px solid var(--gold);
  margin-bottom: 0.45rem;
  line-height: 1.55;
}
.vocab-req {
  font-size: 13px;
  font-family: 'Courier New', monospace;
  color: var(--purple);
  margin-bottom: 0.65rem;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.vocab-req-label { color: var(--ink-muted); }
.vocab-tag {
  background: var(--purple-light);
  border: 1px solid #CECBF6;
  border-radius: 10px;
  padding: 0.15rem 0.5rem;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.vocab-tag.used {
  background: var(--purple);
  color: white;
  border-color: var(--purple);
  text-decoration: line-through;
}
.main-idea-box textarea {
  width: 100%;
  min-height: 90px;
  padding: 0.75rem 1rem;
  border: 1px solid #D4C080;
  border-radius: var(--radius);
  font-family: 'Georgia', serif;
  font-size: 15px;
  line-height: 1.7;
  resize: vertical;
  background: white;
  color: var(--ink);
}
.main-idea-box textarea:focus { outline: 2px solid var(--gold); outline-offset: 1px; border-color: transparent; }
.self-check { margin-top: 0.5rem; font-size: 13px; color: var(--purple); font-style: italic; }

/* ── NAV ── */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--rule);
}
.score-pill {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  background: var(--navy-light);
  color: var(--navy);
}
.btn {
  display: inline-block;
  padding: 0.7rem 1.5rem;
  border-radius: var(--radius);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.15s;
}
.btn-primary { background: var(--navy); color: var(--cream); border-color: var(--navy); }
.btn-primary:hover { background: #2A3E5A; }
.btn-gold { background: var(--gold); color: white; border-color: var(--gold); }
.btn-gold:hover { background: #9A6E09; }
.btn-outline { background: transparent; color: var(--ink-muted); border-color: var(--rule); }
.btn-outline:hover { background: var(--cream); border-color: var(--ink-muted); }

/* ── CER ── */
.cer-prompt-box {
  background: var(--navy);
  color: var(--cream);
  border-radius: var(--radius-lg);
  padding: 1.75rem 2rem;
  margin-bottom: 1.5rem;
}
.cer-prompt-box h2 { font-size: 20px; font-weight: normal; color: #D4AF37; margin-bottom: 0.75rem; }
.cer-prompt-box p { font-size: 15px; line-height: 1.75; }
.cer-prompt-box .cer-question {
  font-size: 16px;
  font-style: italic;
  margin-top: 1rem;
  padding: 1rem 1.25rem;
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius);
  border-left: 3px solid var(--gold);
  line-height: 1.65;
}
.cer-scaffold {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.cer-part {
  background: white;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.1rem;
}
.cer-part-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.cer-part-label.c-label { color: var(--navy); }
.cer-part-label.e-label { color: var(--gold); }
.cer-part-label.r-label { color: var(--purple); }
.cer-part p { font-size: 13px; line-height: 1.55; color: var(--ink-muted); }
.cer-write-section {
  background: white;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.4rem;
  margin-bottom: 1.1rem;
}
.cer-write-section h3 {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.6rem;
}
.cer-write-section textarea {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  font-family: 'Georgia', serif;
  font-size: 15px;
  line-height: 1.75;
  resize: vertical;
  background: var(--cream);
  color: var(--ink);
}
.cer-write-section textarea:focus { outline: 2px solid var(--navy); outline-offset: 1px; border-color: transparent; }
.cer-claim textarea    { min-height: 80px; }
.cer-evidence textarea { min-height: 110px; }
.cer-reasoning textarea { min-height: 110px; }
.vocab-bank {
  background: var(--purple-light);
  border: 1px solid #CECBF6;
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.4rem;
  margin-bottom: 1.25rem;
}
.vocab-bank h3 {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 0.75rem;
}
.vocab-bank-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.vb-chip {
  background: white;
  border: 1px solid #CECBF6;
  border-radius: 20px;
  padding: 0.3rem 0.85rem;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--purple);
}
.vb-chip.crossed {
  background: var(--purple);
  color: white;
  border-color: var(--purple);
  text-decoration: line-through;
  opacity: 0.7;
}
.print-btn {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  color: var(--ink-muted);
}
.print-btn:hover { background: var(--cream); border-color: var(--ink-muted); }

/* ── HISTORICAL IMAGES ── */
.hist-image-block {
  margin-bottom: 1.5rem;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--rule);
}
.hist-image-block img {
  width: 100%;
  display: block;
  max-height: 340px;
  object-fit: cover;
  object-position: center top;
}
.hist-image-caption {
  background: var(--ink);
  color: var(--cream);
  padding: 0.65rem 1rem;
  font-size: 13px;
  line-height: 1.55;
}
.hist-image-caption strong {
  display: block;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.25rem;
}
.intro-mlk-block {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 1.25rem;
  margin-bottom: 1.5rem;
  align-items: start;
}
.intro-mlk-block img {
  width: 100%;
  border-radius: var(--radius-lg);
  border: 1px solid var(--rule);
  display: block;
}
.intro-mlk-caption {
  font-size: 12px;
  color: var(--ink-faint);
  font-style: italic;
  text-align: center;
  margin-top: 0.4rem;
  font-family: 'Courier New', monospace;
}
@media (max-width: 600px) {
  .intro-mlk-block { grid-template-columns: 1fr; }
  .intro-mlk-block img { max-height: 220px; object-fit: cover; }
}

/* ── CLERGYMEN SUMMARY BOX ── */
.clergymen-box {
  background: #F4F1FF;
  border: 1px solid #CECBF6;
  border-left: 4px solid var(--purple);
  border-radius: var(--radius-lg);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.5rem;
}
.clergymen-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 0.6rem;
}
.clergymen-subhead {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-muted);
  margin-bottom: 1rem;
  font-style: italic;
}
.clergymen-points { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1rem; }
.clergymen-point {
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
  font-size: 15px;
  line-height: 1.6;
}
.cp-num {
  background: var(--purple);
  color: white;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.clergymen-bottom {
  font-size: 14px;
  color: var(--purple);
  font-style: italic;
  margin-top: 0.25rem;
}

/* ── CHUNK PLAIN-LANGUAGE SUMMARY ── */
.chunk-summary {
  background: var(--navy-light);
  border: 1px solid #C4D0E8;
  border-left: 4px solid var(--navy);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.4rem;
  margin-bottom: 1.5rem;
}
.chunk-summary-label {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--navy);
  margin-bottom: 0.5rem;
}
.chunk-summary p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-muted);
  margin-bottom: 0.5rem;
}
.chunk-summary p:last-child { margin-bottom: 0; }

/* ── CER COMBINED PREVIEW ── */
.cer-combined-section {
  background: white;
  border: 2px solid var(--navy);
  border-radius: var(--radius-lg);
  padding: 1.4rem;

// STATE

const state = {
  current: 0,
  answers: {},
  mainIdeas: {},
  highlights: {},
  annotates: {},
  cerClaim: '',
  cerEvidence: '',
  cerReasoning: '',
};

const TOTAL_SCREENS = () => CHUNKS.length + 2;

// ── Save / Load ──
let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(save, 2000);
}
function save() {
  try {
    localStorage.setItem('birmingham_sh', JSON.stringify({
      answers:    state.answers,
      mainIdeas:  state.mainIdeas,
      highlights: state.highlights,
      annotates:  state.annotates,
      cerClaim:    state.cerClaim,
      cerEvidence: state.cerEvidence,
      cerReasoning:state.cerReasoning,
    }));
  } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('birmingham_sh') || '{}');
    if (d.answers)      state.answers      = d.answers;
    if (d.mainIdeas)    state.mainIdeas    = d.mainIdeas;
    if (d.highlights)   state.highlights   = d.highlights;
    if (d.annotates)    state.annotates    = d.annotates;
    if (d.cerClaim)     state.cerClaim     = d.cerClaim;
    if (d.cerEvidence)  state.cerEvidence  = d.cerEvidence;
    if (d.cerReasoning) state.cerReasoning = d.cerReasoning;
  } catch(e) {}
}

// ── Progress bar ──
function buildProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  ['Intro', ...CHUNKS.map(c => `${c.num}`), 'CER'].forEach((label, i) => {
    const div = document.createElement('div');
    div.className = 'prog-step';
    div.id = `prog-${i}`;
    div.textContent = label;
    bar.appendChild(div);
  });
}
function updateProgress() {
  for (let i = 0; i < TOTAL_SCREENS(); i++) {
    const el = document.getElementById(`prog-${i}`);
    if (!el) continue;
    el.classList.remove('active', 'done');
    if (i === state.current) el.classList.add('active');
    if (i < state.current)   el.classList.add('done');
  }
}
function goTo(n) {
  state.current = n;
  renderScreen();
  updateProgress();
  window.scrollTo(0, 0);
}

// ── Scoring ──
function chunkScore(ci) {
  let correct = 0, total = 0;
  CHUNKS[ci].questions.forEach((q, qi) => {
    total++;
    if (state.answers[`${ci}-${qi}`] === q.correct) correct++;
  });
  return { correct, total };
}
function totalScore() {
  let correct = 0, total = 0;
  CHUNKS.forEach((_, ci) => { const s = chunkScore(ci); correct += s.correct; total += s.total; });
  return { correct, total };
}

// ── Completion score ──
function completionScore() {
  const mcTotal = CHUNKS.reduce((s, c) => s + c.questions.length, 0);
  const mcDone  = Object.keys(state.answers).length;
  const miDone  = CHUNKS.filter((_, i) => (state.mainIdeas[i] || '').trim().length > 15).length;
  const atDone  = CHUNKS.filter((c, i) => c.annotate && (state.annotates[i] || '').trim().length > 10).length;
  const atTotal = CHUNKS.filter(c => c.annotate).length;
  const cerDone = [state.cerClaim, state.cerEvidence, state.cerReasoning].filter(s => s && s.trim().length > 15).length;
  const { correct } = totalScore();
  const pct = Math.min(100, Math.round(
    (mcDone / Math.max(mcTotal,1)) * 0.35 +
    (miDone / CHUNKS.length)       * 0.30 +
    (atDone / Math.max(atTotal,1)) * 0.10 +
    (cerDone / 3)                  * 0.25
  ) * 100);
  return { mcCorrect: correct, mcTotal, miDone, miTotal: CHUNKS.length, atDone, atTotal, cerDone, cerTotal: 3, pct };
}

      <h2>What Is This Letter?</h2>
      <p>In April 1963, Martin Luther King Jr. was put in jail in Birmingham, Alabama. He was arrested for protesting against unfair laws. While he was in jail, he read a statement from eight white church leaders. They said his protests were "unwise and untimely" — meaning too risky and too soon.</p>
      <p>King disagreed. He wrote a long letter back to them from his jail cell — on the margins of a newspaper, on scraps of paper. Today you will read four of the most important sections of that letter.</p>
      <p>As you read, ask yourself: <strong>What does King want the people reading this to think, feel, or do?</strong></p>
    </div>
  </div>

  <div class="clergymen-box">
    <div class="clergymen-label">📄 The Letter King Was Responding To</div>
    <p class="clergymen-subhead">On April 12, 1963, eight white church leaders published a statement in the Birmingham newspaper. Here is what they said — in plain language:</p>
    <div class="clergymen-points">
      <div class="clergymen-point">
        <span class="cp-num">1</span>
        <span><strong>You are an outsider.</strong> They said King and the protesters came from out of town. They thought Birmingham's problems should be solved by Birmingham people — not "outside agitators."</span>
      </div>
      <div class="clergymen-point">
        <span class="cp-num">2</span>
        <span><strong>The timing is wrong.</strong> They said King was moving too fast. They asked him to wait — to let the new city government (which seemed more moderate) have a chance to fix things first.</span>
      </div>
      <div class="clergymen-point">
        <span class="cp-num">3</span>
        <span><strong>Your methods are dangerous.</strong> They said the marches and protests were creating "hatred and violence." They wanted King to use the courts and quiet meetings instead — not street protests.</span>
      </div>
      <div class="clergymen-point">
        <span class="cp-num">4</span>
        <span><strong>We support your goal, but not this way.</strong> They were not defending segregation. They said they believed in civil rights — they just thought King was going about it the wrong way.</span>
      </div>
    </div>
    <p class="clergymen-bottom">King's letter is his point-by-point answer to each of these criticisms. As you read, watch for how he responds to each one.</p>
  </div>

  <div class="context-grid">
    <div class="context-card">
      <h3>Who Is King Writing To?</h3>
      <p>Eight white church leaders in Alabama. They were not racists — they actually supported civil rights. But they thought King was moving too fast and causing too much trouble. King had to convince people who agreed with his <em>goal</em> but not his <em>methods</em>.</p>
    </div>
    <div class="context-card">
      <h3>When Did He Write This?</h3>
      <p>April 16, 1963 — from a jail cell in Birmingham. Just 14 days later, thousands of young people marched into Bull Connor's fire hoses in the Children's Crusade. Four months later, 250,000 people marched on Washington. King wrote this at a moment when everything was uncertain.</p>
    </div>
  </div>

  <div class="lens-box">
    <h3>Your Reading Question</h3>
    <p>After each section, ask: <strong>What is King trying to get the people reading this to DO or BELIEVE?</strong> This is different from asking what King says — it asks why he says it.</p>
  </div>

  <div class="vocab-requirement">
    <strong>Vocabulary Rule:</strong> After each section, write the main idea using at least one vocabulary word from that section. Use the word in a way that shows you understand it — don't just copy its definition.
  </div>

  <div class="nav-row">
    <div></div>
    <button class="btn btn-gold" onclick="goTo(1)">Start Reading →</button>
  </div>
</div>`;
}

function renderChunk(ci) {
  const chunk = CHUNKS[ci];
  const screenIdx = ci + 1;
  const { correct, total } = chunkScore(ci);
  const scoreText = Object.keys(state.answers).some(k => k.startsWith(`${ci}-`)) ? `${correct}/${total}` : '—';

  // chunk summary
  const summaryHTML = chunk.summary ? `
    <div class="chunk-summary">
      <div class="chunk-summary-label">📖 Plain-Language Summary — Read This First</div>
      ${chunk.summary.map(s => `<p>${s}</p>`).join('')}
    </div>` : '';

  // vocab — always visible cards
  const vocabHTML = chunk.vocab.map(v => `
    <div class="vocab-card">
      <div class="vc-word">${v.word}</div>
      <div class="vc-def">${v.def}</div>
    </div>`).join('');

  // chunk image
  const imageHTML = chunk.image ? `
    <div class="hist-image-block">
      <img src="${chunk.image.src}" alt="${chunk.image.alt}" loading="lazy" />
      <div class="hist-image-caption">
        <strong>${chunk.image.label}</strong>
        ${chunk.image.caption}
      </div>
    </div>` : '';

  // excerpt
  const excerptHTML = chunk.excerpt.map(para => `<p>${para}</p>`).join('');

  // annotation
  const savedAnnotate = state.annotates[ci] || '';
  const annotateHTML = chunk.annotate ? `
    <div class="annotate-prompt">
      <span class="annotate-icon">✏</span>
      <span><strong>Highlight task:</strong> ${chunk.annotate}</span>
    </div>
    <div class="annotate-explain">
      <span class="annotate-explain-label">Why did you choose that sentence?</span>
      <textarea
        id="at-${ci}"
        placeholder="Explain your choice. What does this sentence say or do that is important?"
        onInput="saveAnnotate(${ci}, this)"
      >${savedAnnotate}</textarea>
    </div>` : '';

  // questions
  const questionsHTML = chunk.questions.map((q, qi) => {
    const key = `${ci}-${qi}`;
    const answered = state.answers[key] !== undefined;
    const dokClass = q.dok === 2 ? 'dok2' : '';

    const optionsHTML = q.options.map((opt, oi) => {
      const letter = ['A','B','C','D'][oi];
      let cls = '';
      if (answered) {
        if (letter === q.correct) cls = 'correct';
        else if (letter === state.answers[key]) cls = 'incorrect';
      }
      return `<div class="mc-option ${cls} ${answered ? 'locked' : ''}"
        onclick="answerMC(${ci}, ${qi}, '${letter}', this)">
        <span class="mc-letter">${letter}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');

    const fb = answered
      ? `<div class="mc-feedback show ${state.answers[key] === q.correct ? 'correct' : 'incorrect'}">
           ${state.answers[key] === q.correct ? q.feedbackCorrect : q.feedbackWrong}
         </div>`
      : `<div class="mc-feedback"></div>`;

    return `
    <div class="question-block">
      <div class="dok-badge ${dokClass}">DOK ${q.dok}</div>
      <div class="question-text">${q.text}</div>
      <div class="mc-options">${optionsHTML}</div>
      ${fb}
    </div>`;
  }).join('');

  // vocab tags for main idea
  const vocabTagsHTML = chunk.vocab.map(v =>
    `<span class="vocab-tag" onclick="toggleVocabTag(this)">${v.word}</span>`
  ).join('');

  // sentence frames — always shown
  const framesHTML = chunk.frames.map(f => `<div class="frame">${f}</div>`).join('');

  const savedText = state.mainIdeas[ci] || '';

  return `
<div class="screen active" id="screen-${screenIdx}">
  <div class="chunk-header">
    <div class="chunk-num">${chunk.num}</div>
    <div class="chunk-meta">
      <h2>${chunk.title}</h2>
      <div class="chunk-focus">${chunk.focus}</div>
    </div>
  </div>

  <div class="vocab-section">
    <div class="vocab-section-label">Key Words — Read These First</div>
    <div class="vocab-cards">${vocabHTML}</div>
  </div>

  ${summaryHTML}

  ${imageHTML}

  <div class="excerpt-section">
    <div class="excerpt-label">From the Letter</div>
    ${annotateHTML}
    <div class="excerpt" id="excerpt-${ci}">${excerptHTML}</div>
    <div class="excerpt-hint">Select any text to highlight it in yellow. Click a highlight to remove it.</div>
  </div>

  <div class="questions-section">
    <div class="questions-label">Questions</div>
    ${questionsHTML}
  </div>

  <div class="main-idea-section">
    <div class="main-idea-box">
      <h3>Main Idea — What Is King Trying to Get His Audience to Do or Believe?</h3>
      <div class="frames">${framesHTML}</div>
      <div class="vocab-req">
        <span class="vocab-req-label">Use at least one of these words:</span>
        ${vocabTagsHTML}
      </div>
      <textarea
        id="mi-${ci}"
        placeholder="Write the main idea in your own words. Use at least one vocabulary word."
        onInput="saveMainIdea(${ci}, this)"
      >${savedText}</textarea>
      <div class="self-check">✓ Check: Did you say what King wants his audience to DO or BELIEVE — not just what he said?</div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" onclick="goTo(${screenIdx - 1})">← Back</button>
    <div class="score-pill">Score: ${scoreText}</div>
    <button class="btn btn-primary" onclick="goTo(${screenIdx + 1})">${ci === CHUNKS.length - 1 ? 'Final Writing →' : 'Next Section →'}</button>
  </div>
</div>`;
}

function renderCER() {
  const screenIdx = CHUNKS.length + 1;
  const { correct, total } = totalScore();
  const allVocab = [];
  CHUNKS.forEach(c => c.vocab.forEach(v => { if (!allVocab.includes(v.word)) allVocab.push(v.word); }));
  const bankHTML = allVocab.map(w => `<span class="vb-chip" onclick="toggleVBChip(this)">${w}</span>`).join('');

  return `
<div class="screen active" id="screen-${screenIdx}">
  <div class="cer-prompt-box">
    <h2>Final Writing — CER</h2>
    <p>You have read four sections of King's letter. Now write your own argument. CER means: <strong>Claim</strong> (what you think), <strong>Evidence</strong> (proof from the letter), and <strong>Reasoning</strong> (explaining the connection).</p>
    <div class="cer-question">
      King says the white moderate — someone who agrees with equal rights but tells Black Americans to "wait" — is a bigger problem than someone who is openly racist. Do you agree with King's argument? Use evidence from the letter.
    </div>
  </div>

  <div class="cer-scaffold">
    <div class="cer-part">
      <div class="cer-part-label c-label">C — Claim</div>
      <p>What do you think? Write 1–2 sentences. Take a side — agree or disagree with King. Be specific.</p>
    </div>
    <div class="cer-part">
      <div class="cer-part-label e-label">E — Evidence</div>
      <p>Find at least one sentence or idea from the letter that supports your claim. Put quotes in quotation marks.</p>
    </div>
    <div class="cer-part">
      <div class="cer-part-label r-label">R — Reasoning</div>
      <p>Explain the connection. Why does your evidence support your claim? This is the most important part.</p>
    </div>
  </div>

  <div class="vocab-bank">
    <h3>Use at least 2 of these words in your writing. Click to cross off when you use them.</h3>
    <div class="vocab-bank-chips">${bankHTML}</div>
  </div>

  <div class="cer-write-section cer-claim">
    <h3>My Claim</h3>
    <textarea
      id="cer-claim"
      placeholder="King's argument about the white moderate is [convincing / not convincing] because..."
      onInput="saveCER('claim', this); updateCERCombined()"
    >${state.cerClaim}</textarea>
  </div>

  <div class="cer-write-section cer-evidence">
    <h3>My Evidence</h3>
    <textarea
      id="cer-evidence"
      placeholder="In the letter, King writes '...' This shows that..."
      onInput="saveCER('evidence', this); updateCERCombined()"
    >${state.cerEvidence}</textarea>
  </div>

  <div class="cer-write-section cer-reasoning">
    <h3>My Reasoning</h3>
    <textarea
      id="cer-reasoning"
      placeholder="This evidence supports my claim because... It shows that King believed..."
      onInput="saveCER('reasoning', this); updateCERCombined()"
    >${state.cerReasoning}</textarea>
  </div>

  <div class="cer-combined-section">
    <h3>My Complete CER Response</h3>
    <p class="cer-combined-sub">This box fills in automatically as you write above. This is what your full response looks like put together.</p>
    <textarea id="cer-combined-display" readonly placeholder="Your complete response will appear here as you write your Claim, Evidence, and Reasoning above..."></textarea>
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" onclick="goTo(${screenIdx - 1})">← Back</button>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="score-pill">MC: ${correct}/${total}</span>
      <button class="print-btn" onclick="savePDF()">Save as PDF</button>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════
// INTERACTION HANDLERS
// ═══════════════════════════════════════════════════════════

function answerMC(ci, qi, val, el) {
  const key = `${ci}-${qi}`;
  if (state.answers[key] !== undefined) return;
  const q = CHUNKS[ci].questions[qi];
  state.answers[key] = val;
  save();
  const container = el.closest('.mc-options');
  container.querySelectorAll('.mc-option').forEach(opt => {
    opt.classList.add('locked');
    const v = opt.querySelector('.mc-letter').textContent;
    if (v === q.correct) opt.classList.add('correct');
    else if (v === val && val !== q.correct) opt.classList.add('incorrect');
  });
  const fb = container.nextElementSibling;
  fb.className = `mc-feedback show ${val === q.correct ? 'correct' : 'incorrect'}`;
  fb.textContent = val === q.correct ? q.feedbackCorrect : q.feedbackWrong;
  const { correct, total } = chunkScore(ci);
  const pill = document.querySelector(`#screen-${ci + 1} .score-pill`);
  if (pill) pill.textContent = `Score: ${correct}/${total}`;
}

function saveMainIdea(ci, el) {
  state.mainIdeas[ci] = el.value;
  scheduleSave();
}
function saveAnnotate(ci, el) {
  state.annotates[ci] = el.value;
  scheduleSave();
}
function saveCER(field, el) {
  if (field === 'claim')     state.cerClaim     = el.value;
  if (field === 'evidence')  state.cerEvidence  = el.value;
  if (field === 'reasoning') state.cerReasoning = el.value;
  scheduleSave();
}
function updateCERCombined() {
  const box = document.getElementById('cer-combined-display');
  if (!box) return;
  const claim    = (document.getElementById('cer-claim')    || {value: state.cerClaim    || ''}).value;
  const evidence = (document.getElementById('cer-evidence') || {value: state.cerEvidence || ''}).value;
  const reasoning= (document.getElementById('cer-reasoning')|| {value: state.cerReasoning|| ''}).value;
  const parts = [];
  if (claim.trim())     parts.push(claim.trim());
  if (evidence.trim())  parts.push(evidence.trim());
  if (reasoning.trim()) parts.push(reasoning.trim());
  box.value = parts.join(' ');
}
function toggleVocabTag(el) { el.classList.toggle('used'); }
function toggleVBChip(el)   { el.classList.toggle('crossed'); }

// ── Highlighting ──
document.addEventListener('click', e => {
  const hl = e.target.closest('.user-hl');
  if (!hl) return;
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) return;
  const parent = hl.parentNode;
  while (hl.firstChild) parent.insertBefore(hl.firstChild, hl);
  parent.removeChild(hl);
  parent.normalize();
  const excerpt = e.target.closest('.excerpt') || parent.closest('.excerpt');
  if (excerpt) {
    const ci = parseInt(excerpt.id.replace('excerpt-', ''));
    if (!isNaN(ci)) { state.highlights[ci] = excerpt.innerHTML; scheduleSave(); }
  }
});
document.addEventListener('mouseup', e => {
  const excerpt = e.target.closest('.excerpt');
  if (!excerpt) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.toString().trim() === '') return;
  try {
    const range = sel.getRangeAt(0);
    if (!excerpt.contains(range.commonAncestorContainer)) return;
    const span = document.createElement('span');
    span.className = 'user-hl';
    range.surroundContents(span);
    sel.removeAllRanges();
    const ci = parseInt(excerpt.id.replace('excerpt-', ''));
    if (!isNaN(ci)) { state.highlights[ci] = excerpt.innerHTML; scheduleSave(); }
  } catch(e) { window.getSelection().removeAllRanges(); }
});

// ── Save as PDF ──
function savePDF() {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'block');
  let hdr = document.getElementById('print-score-hdr');
  if (!hdr) {
    hdr = document.createElement('div');
    hdr.id = 'print-score-hdr';
    hdr.className = 'print-score-header';
    document.body.insertBefore(hdr, document.body.firstChild);
  }
  const sc = completionScore();
  hdr.innerHTML = `
    <h2>Letter from Birmingham Jail — Close Reading · Completion Report</h2>
    <div class="print-score-grid">
      <div class="print-score-item"><div class="psi-label">MC Score</div><div class="psi-val">${sc.mcCorrect} / ${sc.mcTotal}</div></div>
      <div class="print-score-item"><div class="psi-label">Main Ideas</div><div class="psi-val">${sc.miDone} / ${sc.miTotal}</div></div>
      <div class="print-score-item"><div class="psi-label">Annotations</div><div class="psi-val">${sc.atDone} / ${sc.atTotal}</div></div>
      <div class="print-score-item"><div class="psi-label">CER Sections</div><div class="psi-val">${sc.cerDone} / ${sc.cerTotal}</div></div>
    </div>
    <div style="margin-top:0.5rem;font-size:11px;color:#aaa;">Completion: ${sc.pct}% &nbsp;·&nbsp; CER completed: ${sc.cerDone === 3 ? '✓ Yes' : `${sc.cerDone}/3 sections`} &nbsp;·&nbsp; Auto-saved via localStorage</div>`;
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      document.querySelectorAll('.screen').forEach(s => s.style.display = '');
      renderScreen();
    }, 1000);
  }, 100);
}

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════
function renderScreen() {
  const container = document.getElementById('screens');
  if (state.current === 0) {
    container.innerHTML = renderIntro();
  } else if (state.current === CHUNKS.length + 1) {
    container.innerHTML = renderCER();
  } else {
    const ci = state.current - 1;
    container.innerHTML = renderChunk(ci);
    const excerptEl = document.getElementById(`excerpt-${ci}`);
    if (excerptEl && state.highlights[ci]) excerptEl.innerHTML = state.highlights[ci];
    const atEl = document.getElementById(`at-${ci}`);
    if (atEl && state.annotates[ci]) atEl.value = state.annotates[ci];
  }
}

// ── Init ──
load();
buildProgressBar();
updateProgress();
renderScreen();
updateCERCombined();
</script>
</body>
</html>
